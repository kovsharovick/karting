services:
  test-runner:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./tests:/app/tests
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: karting
      DB_USER: karting
      DB_PASSWORD: 1111
      API_BASE_URL: http://backend:8080
    command: >
      sh -c "
        pip install --no-cache-dir -r /app/tests/integration/requirements.txt &&
        pytest /app/tests/integration -v
      "
    networks:
      - apex_karting_net

networks:
  apex_karting_net:
    external: true