spring:
  application:
    name: karting-backend
  profiles:
    active: dev   # по умолчанию dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:very_secret_key_for_jwt_must_be_at_least_256_bits}
  access-token-ttl: ${JWT_ACCESS_TTL:900}
  refresh-token-ttl: ${JWT_REFRESH_TTL:604800}

logging:
  level:
    ru.vsu.cs.yesikov: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

---
# Профиль для разработки с H2 (отключает планировщик и Flyway)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:karting;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  task:
    scheduling:
      enabled: false

---
# Профиль для продакшена/по умолчанию (PostgreSQL)
spring:
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:karting}
    username: ${DB_USER:karting}
    password: ${DB_PASSWORD:1111}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true